<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Users - MyIEC Smart ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .glass-hover { transition: all 0.3s ease; }
    .glass-hover:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
    .error-input { border-color: #ef4444 !important; }
    .success-input { border-color: #10b981 !important; }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen p-4 lg:p-8">
  <!-- Navigation Bar -->
  <nav class="glass rounded-2xl p-6 mb-8 fade-in">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center">
          <span class="text-white font-bold">IEC</span>
        </div>
        <h1 class="text-white font-bold text-lg">MY IEC Smart ERP</h1>
      </div>
      <div class="flex items-center gap-4">
        <span id="adminName" class="text-gray-300 text-sm">Admin User</span>
        <button onclick="logout()" class="glass-hover px-4 py-2 rounded-lg text-red-400 hover:text-red-300 text-sm font-semibold">
          <i class="fas fa-sign-out-alt mr-2"></i>Logout
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="max-w-6xl mx-auto">
    <!-- Tab Navigation -->
    <div class="glass rounded-t-2xl p-4 mb-0 flex flex-wrap gap-2 border-b border-white/10">
      <button onclick="switchTab('register')" id="tab-register-btn" class="px-6 py-3 rounded-lg bg-gradient-to-r from-purple-500 to-blue-500 text-white font-semibold">
        <i class="fas fa-user-plus mr-2"></i>Register User
      </button>
      <button onclick="switchTab('users')" id="tab-users-btn" class="px-6 py-3 rounded-lg glass-hover text-gray-300 hover:text-white font-semibold">
        <i class="fas fa-users mr-2"></i>View Users
      </button>
      <button onclick="switchTab('dashboard')" id="tab-dashboard-btn" class="px-6 py-3 rounded-lg glass-hover text-gray-300 hover:text-white font-semibold ml-auto">
        <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
      </button>
    </div>

    <!-- Registration Tab -->
    <div id="tab-register" class="glass rounded-b-2xl p-8 fade-in">
      <h2 class="text-2xl font-bold text-white mb-8">Register New User</h2>

      <!-- Form -->
      <form id="registrationForm" class="space-y-6">
        <!-- Row 1: Name and Role -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2">Full Name *</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required
              class="w-full glass rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
            <span class="error-message text-red-400 text-xs mt-1" style="display:none;"></span>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2">Role *</label>
            <select id="role" name="role" required onchange="updateRoleFields()"
              class="w-full glass rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
              <option value="">Select Role...</option>
              <option value="student">Student</option>
              <option value="faculty">Faculty</option>
            </select>
            <span class="error-message text-red-400 text-xs mt-1" style="display:none;"></span>
          </div>
        </div>

        <!-- Row 2: Roll Number and Department -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2">Roll Number / Employee ID *</label>
            <input type="text" id="rollNo" name="rollNo" placeholder="CS202101001" required
              class="w-full glass rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
            <span class="error-message text-red-400 text-xs mt-1" style="display:none;"></span>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2">Department / Branch *</label>
            <select id="department" name="department" required
              class="w-full glass rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
              <option value="">Select Department...</option>
              <option value="CSE">Computer Science Engineering</option>
              <option value="ECE">Electronics & Communication</option>
              <option value="ME">Mechanical Engineering</option>
              <option value="CE">Civil Engineering</option>
              <option value="IT">Information Technology</option>
              <option value="Admin">Administration</option>
            </select>
            <span class="error-message text-red-400 text-xs mt-1" style="display:none;"></span>
          </div>
        </div>

        <!-- Row 3: Semester and Email -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div id="semesterField" style="display:none;">
            <label class="block text-sm font-semibold text-gray-300 mb-2">Semester *</label>
            <select id="semester" name="semester"
              class="w-full glass rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
              <option value="">Select Semester...</option>
              <option value="1">1st Semester</option>
              <option value="2">2nd Semester</option>
              <option value="3">3rd Semester</option>
              <option value="4">4th Semester</option>
              <option value="5">5th Semester</option>
              <option value="6">6th Semester</option>
              <option value="7">7th Semester</option>
              <option value="8">8th Semester</option>
            </select>
            <span class="error-message text-red-400 text-xs mt-1" style="display:none;"></span>
          </div>

          <div id="designationField" style="display:none;">
            <label class="block text-sm font-semibold text-gray-300 mb-2">Designation *</label>
            <select id="designation" name="designation"
              class="w-full glass rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
              <option value="">Select Designation...</option>
              <option value="Professor">Professor</option>
              <option value="Associate Professor">Associate Professor</option>
              <option value="Assistant Professor">Assistant Professor</option>
              <option value="Lecturer">Lecturer</option>
            </select>
            <span class="error-message text-red-400 text-xs mt-1" style="display:none;"></span>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2">Email Address *</label>
            <input type="email" id="email" name="email" placeholder="john.doe@iec.ac.in" required
              class="w-full glass rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
            <span class="error-message text-red-400 text-xs mt-1" style="display:none;"></span>
          </div>
        </div>

        <!-- Row 4: Password and Confirm Password -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2">Password *</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required
              class="w-full glass rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
            <span class="text-gray-400 text-xs mt-1">Min 8 characters, 1 uppercase, 1 number, 1 special char</span>
            <span class="error-message text-red-400 text-xs mt-1" style="display:none;"></span>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2">Confirm Password *</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required
              class="w-full glass rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
            <span class="error-message text-red-400 text-xs mt-1" style="display:none;"></span>
          </div>
        </div>

        <!-- Row 5: Status and Batch -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2">Status *</label>
            <select id="status" name="status" required
              class="w-full glass rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
              <option value="">Select Status...</option>
              <option value="active" selected>Active</option>
              <option value="inactive">Inactive</option>
              <option value="suspended">Suspended</option>
            </select>
            <span class="error-message text-red-400 text-xs mt-1" style="display:none;"></span>
          </div>

          <div id="batchField" style="display:none;">
            <label class="block text-sm font-semibold text-gray-300 mb-2">Batch Year *</label>
            <select id="batch" name="batch"
              class="w-full glass rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
              <option value="">Select Batch...</option>
              <option value="2021">2021</option>
              <option value="2022">2022</option>
              <option value="2023">2023</option>
              <option value="2024">2024</option>
              <option value="2025">2025</option>
            </select>
            <span class="error-message text-red-400 text-xs mt-1" style="display:none;"></span>
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4 pt-4 border-t border-white/10">
          <button type="submit" class="flex-1 bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-600 hover:to-emerald-600 text-white font-bold py-3 rounded-lg transition transform hover:scale-105">
            <i class="fas fa-check mr-2"></i>Register User
          </button>
          <button type="reset" class="flex-1 glass-hover text-white font-bold py-3 rounded-lg transition">
            <i class="fas fa-redo mr-2"></i>Clear Form
          </button>
        </div>
      </form>

      <!-- Success/Error Messages -->
      <div id="successMessage" class="mt-6 p-4 rounded-lg bg-green-500/20 border border-green-500/50 text-green-300 hidden">
        <i class="fas fa-check-circle mr-2"></i>
        <span id="successText"></span>
      </div>

      <div id="errorMessage" class="mt-6 p-4 rounded-lg bg-red-500/20 border border-red-500/50 text-red-300 hidden">
        <i class="fas fa-exclamation-circle mr-2"></i>
        <span id="errorText"></span>
      </div>
    </div>

    <!-- Users Tab -->
    <div id="tab-users" class="glass rounded-b-2xl p-8 fade-in hidden">
      <h2 class="text-2xl font-bold text-white mb-8">Registered Users</h2>

      <!-- Search and Filter -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <input type="text" id="searchInput" placeholder="Search by name or email..." 
          class="glass rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500"
          onkeyup="filterUsers()">
        <select id="roleFilter" class="glass rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-purple-500" onchange="filterUsers()">
          <option value="">All Roles</option>
          <option value="student">Students</option>
          <option value="faculty">Faculty</option>
          <option value="admin">Admins</option>
        </select>
        <select id="statusFilter" class="glass rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-purple-500" onchange="filterUsers()">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="suspended">Suspended</option>
        </select>
        <button onclick="exportUsers()" class="glass-hover px-4 py-2 rounded-lg text-white font-semibold">
          <i class="fas fa-download mr-2"></i>Export
        </button>
      </div>

      <!-- Users Table -->
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-white/10">
              <th class="px-4 py-3 text-left text-gray-400 font-semibold">Name</th>
              <th class="px-4 py-3 text-left text-gray-400 font-semibold">Email</th>
              <th class="px-4 py-3 text-left text-gray-400 font-semibold">Roll/EID</th>
              <th class="px-4 py-3 text-left text-gray-400 font-semibold">Role</th>
              <th class="px-4 py-3 text-left text-gray-400 font-semibold">Department</th>
              <th class="px-4 py-3 text-left text-gray-400 font-semibold">Status</th>
              <th class="px-4 py-3 text-center text-gray-400 font-semibold">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody" class="text-white">
            <tr class="border-b border-white/10">
              <td colspan="7" class="px-4 py-3 text-center text-gray-400">Loading users...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8">
        <div class="glass rounded-lg p-4 text-center">
          <div class="text-2xl font-bold text-blue-400" id="totalUsers">0</div>
          <div class="text-gray-400 text-sm">Total Users</div>
        </div>
        <div class="glass rounded-lg p-4 text-center">
          <div class="text-2xl font-bold text-purple-400" id="totalStudents">0</div>
          <div class="text-gray-400 text-sm">Students</div>
        </div>
        <div class="glass rounded-lg p-4 text-center">
          <div class="text-2xl font-bold text-pink-400" id="totalFaculty">0</div>
          <div class="text-gray-400 text-sm">Faculty</div>
        </div>
        <div class="glass rounded-lg p-4 text-center">
          <div class="text-2xl font-bold text-green-400" id="activeUsers">0</div>
          <div class="text-gray-400 text-sm">Active</div>
        </div>
      </div>
    </div>

    <!-- Dashboard Tab -->
    <div id="tab-dashboard" class="glass rounded-b-2xl p-8 fade-in hidden">
      <p class="text-gray-300 text-center py-8">Redirecting to admin dashboard...</p>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4" style="display:none;">
    <div class="glass rounded-2xl p-6 max-w-md w-full">
      <h3 class="text-xl font-bold text-white mb-4">Edit User</h3>
      <form id="editForm" class="space-y-4">
        <div>
          <label class="text-sm font-semibold text-gray-300 mb-2 block">Status</label>
          <select id="editStatus" class="w-full glass rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="suspended">Suspended</option>
          </select>
        </div>
        <div class="flex gap-3">
          <button type="button" onclick="closeEditModal()" class="flex-1 glass-hover px-4 py-2 rounded-lg text-white">Cancel</button>
          <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-white font-semibold">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/admin-register.js"></script>
</body>
</html>
