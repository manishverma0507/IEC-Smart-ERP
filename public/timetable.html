<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timetable - MyIEC ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 font-['Inter']">
  <nav class="border-b border-slate-700 bg-slate-800/80">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="dashboard.html" class="text-xl font-bold text-cyan-400">MyIEC ERP</a>
      <button onclick="MyIEC.logout()" class="px-3 py-1.5 rounded bg-slate-700 text-slate-300 hover:bg-slate-600 text-sm">Logout</button>
    </div>
  </nav>
  <div class="max-w-6xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-4">Timetable</h1>
    <div id="ttList" class="space-y-4">Loading...</div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (!MyIEC.isLoggedIn()) { window.location.href = 'login.html'; return; }
    (async () => {
      try {
        const res = await MyIEC.api('/timetable');
        const list = res.data || [];
        if (!list.length) { document.getElementById('ttList').innerHTML = '<p class="text-slate-400">No timetables.</p>'; return; }
        document.getElementById('ttList').innerHTML = list.map(tt => {
          const slotRows = (tt.slots || []).map(s => '<tr class="border-t border-slate-700"><td class="p-2">' + (s.day || '') + '</td><td class="p-2">' + (s.startTime + '-' + s.endTime) + '</td><td class="p-2">' + (s.subject?.code || s.subject) + '</td><td class="p-2">' + (s.room || '') + '</td></tr>').join('');
          return '<div class="bg-slate-800/60 border border-slate-700 rounded-xl overflow-hidden mb-4"><div class="p-3 border-b border-slate-700 font-semibold">' + (tt.name || '') + ' · ' + (tt.session || '') + (tt.branch ? ' · ' + tt.branch : '') + (tt.semester ? ' Sem ' + tt.semester : '') + '</div><table class="w-full text-left"><thead class="bg-slate-700/50"><tr><th class="p-2">Day</th><th class="p-2">Time</th><th class="p-2">Subject</th><th class="p-2">Room</th></tr></thead><tbody>' + slotRows + '</tbody></table></div>';
        }).join('');
      } catch (e) {
        document.getElementById('ttList').innerHTML = '<p class="text-red-400">' + e.message + '</p>';
      }
    })();
  </script>
</body>
</html>
