<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notices - MyIEC ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-100 font-['Inter']">
  <nav class="bg-slate-800 text-white shadow">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="student-dashboard.html" class="text-xl font-bold text-cyan-400">MyIEC ERP</a>
      <a href="student-dashboard.html" class="text-slate-400 hover:text-white text-sm">← Dashboard</a>
    </div>
  </nav>
  <div class="max-w-6xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold text-slate-800 mb-4">Notices</h1>
    <div id="noticeList" class="space-y-4">Loading...</div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (!MyIEC.isLoggedIn()) { window.location.href = 'login.html'; return; }
    var user = MyIEC.getUser();
    if (user.role !== 'student') { window.location.href = MyIEC.getRoleDashboard(user.role); return; }
    (async function() {
      try {
        var r = await MyIEC.api('/notices?limit=30');
        var list = r.data || [];
        var container = document.getElementById('noticeList');
        if (!list.length) { container.innerHTML = '<p class="text-slate-500">No notices.</p>'; return; }
        container.innerHTML = list.map(function(n) {
          return '<div class="bg-white rounded-xl shadow p-4 border border-slate-200"><h3 class="font-semibold text-cyan-600">' + (n.title || '') + '</h3><p class="text-slate-600 text-sm mt-1">' + (n.summary || n.body ? n.body.slice(0, 200) : '') + '</p><p class="text-slate-400 text-xs mt-2">' + (n.category || '') + ' · ' + (n.publishedAt ? new Date(n.publishedAt).toLocaleDateString() : '') + '</p></div>';
        }).join('');
      } catch (e) {
        document.getElementById('noticeList').innerHTML = '<p class="text-red-600">' + e.message + '</p>';
      }
    })();
  </script>
</body>
</html>
