<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Attendance - MyIEC ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-100 font-['Inter']">
  <nav class="bg-slate-800 text-white shadow">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="student-dashboard.html" class="text-xl font-bold text-cyan-400">MyIEC ERP</a>
      <a href="student-dashboard.html" class="text-slate-400 hover:text-white text-sm">← Dashboard</a>
    </div>
  </nav>
  <div class="max-w-6xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold text-slate-800 mb-4">My Attendance</h1>
    <div class="bg-white rounded-xl shadow p-4 mb-4">
      <p class="text-slate-600 text-sm mb-2">Overall & subject-wise attendance (data from ERP).</p>
      <p id="statText" class="font-semibold text-cyan-600">Loading...</p>
    </div>
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-left">
        <thead class="bg-slate-100 border-b border-slate-200">
          <tr><th class="p-3">Date</th><th class="p-3">Subject</th><th class="p-3">Status</th></tr>
        </thead>
        <tbody id="attList"></tbody>
      </table>
      <p id="emptyMsg" class="p-4 text-slate-500 hidden">No records.</p>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (!MyIEC.isLoggedIn()) { window.location.href = 'login.html'; return; }
    var user = MyIEC.getUser();
    if (user.role !== 'student') { window.location.href = MyIEC.getRoleDashboard(user.role); return; }
    (async function() {
      try {
        var [statsRes, listRes] = await Promise.all([
          MyIEC.api('/attendance/stats'),
          MyIEC.api('/attendance?limit=50')
        ]);
        var s = statsRes.data;
        document.getElementById('statText').textContent = 'Attendance: ' + (s.percentage != null ? s.percentage + '%' : '—') + ' (Present: ' + (s.present || 0) + ' / ' + (s.total || 0) + ')';
        var list = listRes.data || [];
        var tbody = document.getElementById('attList');
        var empty = document.getElementById('emptyMsg');
        if (!list.length) { empty.classList.remove('hidden'); return; }
        tbody.innerHTML = list.map(function(r) {
          return '<tr class="border-t border-slate-100"><td class="p-3">' + (r.date ? new Date(r.date).toLocaleDateString() : '') + '</td><td class="p-3">' + (r.subject && r.subject.code ? r.subject.code : (r.subject || '')) + '</td><td class="p-3">' + (r.status || '') + '</td></tr>';
        }).join('');
      } catch (e) {
        document.getElementById('statText').textContent = 'Error: ' + e.message;
      }
    })();
  </script>
</body>
</html>
