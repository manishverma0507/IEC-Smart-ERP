<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mark Attendance - MyIEC ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-100 font-['Inter']">
  <nav class="bg-slate-800 text-white shadow">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="faculty-dashboard.html" class="text-xl font-bold text-cyan-400">MyIEC ERP</a>
      <a href="faculty-dashboard.html" class="text-slate-400 hover:text-white text-sm">← Dashboard</a>
    </div>
  </nav>
  <div class="max-w-6xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold text-slate-800 mb-4">Mark Attendance</h1>
    <div class="bg-white rounded-xl shadow p-4 mb-4 max-w-md">
      <label class="block text-slate-700 font-medium mb-2">Subject</label>
      <select id="subjectId" class="w-full px-3 py-2 border border-slate-300 rounded-lg mb-3"></select>
      <label class="block text-slate-700 font-medium mb-2">Date</label>
      <input type="date" id="attDate" class="w-full px-3 py-2 border border-slate-300 rounded-lg mb-3">
      <p class="text-slate-500 text-sm mb-2">Single mark: Student ID, Status</p>
      <input type="text" id="studentId" placeholder="Student ID (MongoDB _id)" class="w-full px-3 py-2 border border-slate-300 rounded-lg mb-2">
      <select id="status" class="w-full px-3 py-2 border border-slate-300 rounded-lg mb-3">
        <option value="present">Present</option>
        <option value="absent">Absent</option>
        <option value="late">Late</option>
      </select>
      <button type="button" id="btnMark" class="w-full py-2 bg-cyan-600 text-white rounded-lg font-medium hover:bg-cyan-700">Mark Attendance</button>
      <p id="msg" class="mt-2 text-sm hidden"></p>
    </div>
    <p class="text-slate-500 text-sm">For bulk marking use API: POST /api/attendance/bulk with subjectId, date, entries: [{ studentId, status }].</p>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (!MyIEC.isLoggedIn()) { window.location.href = 'login.html'; return; }
    var user = MyIEC.getUser();
    if (user.role !== 'faculty') { window.location.href = MyIEC.getRoleDashboard(user.role); return; }
    (async function loadSubjects() {
      try {
        var r = await MyIEC.api('/subjects');
        var list = r.data || [];
        var sel = document.getElementById('subjectId');
        sel.innerHTML = '<option value="">Select subject</option>' + list.map(function(s) { return '<option value="' + s._id + '">' + (s.code || '') + ' - ' + (s.name || '') + '</option>'; }).join('');
      } catch (e) {}
    })();
    document.getElementById('attDate').value = new Date().toISOString().slice(0, 10);
    document.getElementById('btnMark').addEventListener('click', async function() {
      var subjectId = document.getElementById('subjectId').value;
      var date = document.getElementById('attDate').value;
      var studentId = document.getElementById('studentId').value.trim();
      var status = document.getElementById('status').value;
      var msgEl = document.getElementById('msg');
      if (!subjectId || !date || !studentId) { msgEl.textContent = 'Fill subject, date and student ID.'; msgEl.classList.remove('hidden'); msgEl.classList.add('text-amber-600'); return; }
      try {
        await MyIEC.api('/attendance/mark', { method: 'POST', body: { subjectId, date, studentId, status } });
        msgEl.textContent = 'Marked successfully.';
        msgEl.classList.remove('hidden', 'text-amber-600'); msgEl.classList.add('text-emerald-600');
      } catch (e) {
        msgEl.textContent = e.message;
        msgEl.classList.remove('hidden'); msgEl.classList.add('text-red-600');
      }
    });
  </script>
</body>
</html>
