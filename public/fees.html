<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fees - MyIEC ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 font-['Inter']">
  <nav class="border-b border-slate-700 bg-slate-800/80">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="dashboard.html" class="text-xl font-bold text-cyan-400">MyIEC ERP</a>
      <button onclick="MyIEC.logout()" class="px-3 py-1.5 rounded bg-slate-700 text-slate-300 hover:bg-slate-600 text-sm">Logout</button>
    </div>
  </nav>
  <div class="max-w-6xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-4">Fee Management</h1>
    <div id="feeRisk" class="hidden bg-amber-900/20 border border-amber-700/50 rounded-xl p-4 mb-4"></div>
    <div id="feeList" class="bg-slate-800/60 border border-slate-700 rounded-xl overflow-hidden">Loading...</div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (!MyIEC.isLoggedIn()) { window.location.href = 'login.html'; return; }
    const user = MyIEC.getUser();
    const studentQ = user.role === 'student' ? '?studentId=' + user.id : '';
    (async () => {
      try {
        if (['admin', 'management'].includes(user.role)) {
          const risk = await MyIEC.api('/fees/risk');
          const d = risk.data;
          document.getElementById('feeRisk').classList.remove('hidden');
          document.getElementById('feeRisk').innerHTML = 'Risk: ' + (d.riskLevel || '—') + ' · Overdue: ' + (d.overdueCount || 0) + ' · Students at risk: ' + (d.studentsAtRisk || 0);
        }
        const res = await MyIEC.api('/fees' + studentQ);
        const list = res.data || [];
        document.getElementById('feeList').innerHTML = list.length ? '<table class="w-full text-left"><thead class="bg-slate-700/50"><tr><th class="p-3">Type</th><th class="p-3">Amount</th><th class="p-3">Due</th><th class="p-3">Status</th></tr></thead><tbody>' + list.map(f => '<tr class="border-t border-slate-700"><td class="p-3">' + (f.type || '') + '</td><td class="p-3">₹' + (f.amount || 0) + '</td><td class="p-3">' + (f.dueDate ? new Date(f.dueDate).toLocaleDateString() : '') + '</td><td class="p-3">' + (f.status || '') + '</td></tr>').join('') + '</tbody></table>' : '<p class="p-4 text-slate-400">No fee records.</p>';
      } catch (e) {
        document.getElementById('feeList').innerHTML = '<p class="p-4 text-red-400">' + e.message + '</p>';
      }
    })();
  </script>
</body>
</html>
