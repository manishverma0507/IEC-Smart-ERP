<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Notice - MyIEC ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-100 font-['Inter']">
  <nav class="bg-slate-800 text-white shadow">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="faculty-dashboard.html" class="text-xl font-bold text-cyan-400">MyIEC ERP</a>
      <a href="faculty-dashboard.html" class="text-slate-400 hover:text-white text-sm">← Dashboard</a>
    </div>
  </nav>
  <div class="max-w-2xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold text-slate-800 mb-4">Create Notice</h1>
    <p class="text-slate-500 text-sm mb-4">Create notices for students and faculty.</p>
    <div class="bg-white rounded-xl shadow p-4">
      <label class="block text-slate-700 font-medium mb-2">Title</label>
      <input type="text" id="title" class="w-full px-3 py-2 border border-slate-300 rounded-lg mb-3" placeholder="Notice title">
      <label class="block text-slate-700 font-medium mb-2">Body</label>
      <textarea id="body" class="w-full px-3 py-2 border border-slate-300 rounded-lg mb-3" rows="4" placeholder="Full notice text"></textarea>
      <label class="block text-slate-700 font-medium mb-2">Category</label>
      <select id="category" class="w-full px-3 py-2 border border-slate-300 rounded-lg mb-3">
        <option value="general">General</option>
        <option value="academic">Academic</option>
        <option value="exam">Exam</option>
        <option value="fee">Fee</option>
        <option value="event">Event</option>
      </select>
      <button type="button" id="btnCreate" class="w-full py-2 bg-cyan-600 text-white rounded-lg font-medium hover:bg-cyan-700">Create Notice</button>
      <p id="msg" class="mt-2 text-sm hidden"></p>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (!MyIEC.isLoggedIn()) { window.location.href = 'login.html'; return; }
    var user = MyIEC.getUser();
    if (user.role !== 'faculty') { window.location.href = MyIEC.getRoleDashboard(user.role); return; }
    document.getElementById('btnCreate').addEventListener('click', async function() {
      var title = document.getElementById('title').value.trim();
      var body = document.getElementById('body').value.trim();
      var category = document.getElementById('category').value;
      var msgEl = document.getElementById('msg');
      if (!title || !body) { msgEl.textContent = 'Fill title and body.'; msgEl.classList.remove('hidden'); msgEl.classList.add('text-amber-600'); return; }
      try {
        await MyIEC.api('/notices', { method: 'POST', body: { title, body, category, targetRoles: ['student', 'faculty'] } });
        msgEl.textContent = 'Notice created.';
        msgEl.classList.remove('hidden', 'text-amber-600'); msgEl.classList.add('text-emerald-600');
      } catch (e) {
        msgEl.textContent = e.message;
        msgEl.classList.remove('hidden'); msgEl.classList.add('text-red-600');
      }
    });
  </script>
</body>
</html>
