<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exams & Results - MyIEC ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 font-['Inter']">
  <nav class="border-b border-slate-700 bg-slate-800/80">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="dashboard.html" class="text-xl font-bold text-cyan-400">MyIEC ERP</a>
      <button onclick="MyIEC.logout()" class="px-3 py-1.5 rounded bg-slate-700 text-slate-300 hover:bg-slate-600 text-sm">Logout</button>
    </div>
  </nav>
  <div class="max-w-6xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-4">Exams & Results</h1>
    <div id="cgpaBox" class="hidden bg-slate-800/60 border border-slate-700 rounded-xl p-4 mb-4"><strong>CGPA:</strong> <span id="cgpaVal"></span></div>
    <div id="resultsList" class="bg-slate-800/60 border border-slate-700 rounded-xl overflow-hidden">Loading...</div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (!MyIEC.isLoggedIn()) { window.location.href = 'login.html'; return; }
    const user = MyIEC.getUser();
    const studentId = user.role === 'student' ? user.id : new URLSearchParams(location.search).get('studentId');
    (async () => {
      try {
        if (studentId) {
          const cgpaRes = await MyIEC.api('/exams/results/cgpa?studentId=' + studentId);
          if (cgpaRes.data?.cgpa != null) {
            document.getElementById('cgpaBox').classList.remove('hidden');
            document.getElementById('cgpaVal').textContent = cgpaRes.data.cgpa;
          }
        }
        const q = studentId ? '?studentId=' + studentId + '&limit=30' : '?limit=30';
        const res = await MyIEC.api('/exams/results' + q);
        const list = res.data || [];
        document.getElementById('resultsList').innerHTML = list.length ? '<table class="w-full text-left"><thead class="bg-slate-700/50"><tr><th class="p-3">Session</th><th class="p-3">Subject</th><th class="p-3">Type</th><th class="p-3">Marks</th><th class="p-3">Grade</th></tr></thead><tbody>' + list.map(r => '<tr class="border-t border-slate-700"><td class="p-3">' + (r.examSession || '') + '</td><td class="p-3">' + (r.subject?.code || r.subject) + '</td><td class="p-3">' + (r.examType || '') + '</td><td class="p-3">' + (r.marksObtained + '/' + r.maxMarks) + '</td><td class="p-3">' + (r.grade || '') + '</td></tr>').join('') + '</tbody></table>' : '<p class="p-4 text-slate-400">No results.</p>';
      } catch (e) {
        document.getElementById('resultsList').innerHTML = '<p class="p-4 text-red-400">' + e.message + '</p>';
      }
    })();
  </script>
</body>
</html>
