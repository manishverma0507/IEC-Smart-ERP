<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library - MyIEC ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 font-['Inter']">
  <nav class="border-b border-slate-700 bg-slate-800/80">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="dashboard.html" class="text-xl font-bold text-cyan-400">MyIEC ERP</a>
      <button onclick="MyIEC.logout()" class="px-3 py-1.5 rounded bg-slate-700 text-slate-300 hover:bg-slate-600 text-sm">Logout</button>
    </div>
  </nav>
  <div class="max-w-6xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-4">Library</h1>
    <div id="recommendations" class="hidden mb-6">
      <h2 class="text-lg font-semibold text-cyan-400 mb-2">Recommended for you</h2>
      <div id="recList" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>
    <h2 class="text-lg font-semibold mb-2">My issues</h2>
    <div id="issueList" class="bg-slate-800/60 border border-slate-700 rounded-xl overflow-hidden">Loading...</div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (!MyIEC.isLoggedIn()) { window.location.href = 'login.html'; return; }
    (async () => {
      try {
        const [recRes, issueRes] = await Promise.all([
          MyIEC.api('/library/recommendations'),
          MyIEC.api('/library/issues'),
        ]);
        const rec = recRes.data || [];
        if (rec.length) {
          document.getElementById('recommendations').classList.remove('hidden');
          document.getElementById('recList').innerHTML = rec.map(b => '<div class="p-3 rounded-lg bg-slate-800 border border-slate-700"><strong>' + (b.title || '') + '</strong><br><span class="text-slate-400 text-sm">' + (b.author || '') + '</span></div>').join('');
        }
        const issues = issueRes.data || [];
        document.getElementById('issueList').innerHTML = issues.length ? '<table class="w-full text-left"><thead class="bg-slate-700/50"><tr><th class="p-3">Book</th><th class="p-3">Issued</th><th class="p-3">Due</th><th class="p-3">Status</th></tr></thead><tbody>' + issues.map(i => '<tr class="border-t border-slate-700"><td class="p-3">' + (i.book?.title || '') + '</td><td class="p-3">' + (i.issuedAt ? new Date(i.issuedAt).toLocaleDateString() : '') + '</td><td class="p-3">' + (i.dueDate ? new Date(i.dueDate).toLocaleDateString() : '') + '</td><td class="p-3">' + (i.status || '') + '</td></tr>').join('') + '</tbody></table>' : '<p class="p-4 text-slate-400">No issues.</p>';
      } catch (e) {
        document.getElementById('issueList').innerHTML = '<p class="p-4 text-red-400">' + e.message + '</p>';
      }
    })();
  </script>
</body>
</html>
